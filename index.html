    <style>
        body { 
            background-color: #1a1a1a; 
            margin: 0; padding: 0; font-family: sans-serif; color: white;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }
        /* صورة الغلاف */
        .banner-img { width: 100%; height: 200px; background-image: url('banner.jpg'); background-size: cover; background-position: center; }

        /* الصورة الشخصية المتداخلة */
        .img-wrapper { position: relative; width: 180px; height: 180px; margin-top: -90px; }
        .profile-img { width: 170px; height: 170px; border-radius: 50%; border: 5px solid #00d2ff; background-color: #1a1a1a; }
        @keyframes rotate { 100% { transform: rotate(360deg); } }
        .img-wrapper::after { content: ''; position: absolute; top: -5px; left: -5px; width: 180px; height: 180px; border-radius: 50%; border: 5px solid transparent; border-top: 5px solid #00d2ff; border-bottom: 5px solid #00d2ff; animation: rotate 2s linear infinite; }
        
        /* النصوص */
        @keyframes pulseText { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        .info-section { text-align: center; margin: 20px 0; animation: pulseText 3s infinite; }
        .name-text { font-size: 40px; font-weight: bold; margin: 0; }
        .desc-fixed { font-size: 20px; color: #ffcc00; margin: 10px 20px; font-weight: bold; }

        /* الأزرار */
        @keyframes bounceIcon { 0%, 100% { transform: translateX(0); } 50% { transform: translateX(-10px); } }
        .links-container { width: 90%; max-width: 500px; display: grid; gap: 15px; margin-bottom: 30px; }
        .link-btn { 
            background: rgba(0,0,0,0.6); color: white; text-decoration: none; padding: 20px; 
            border-radius: 20px; border: 2px solid #00d2ff; font-size: 22px; font-weight: bold;
            display: flex; align-items: center; justify-content: center; gap: 15px;
        }
        .link-btn i { font-size: 30px; animation: bounceIcon 2s infinite; }
        
        .share-btn { margin-bottom: 30px; background: #00d2ff; color: #000; padding: 15px 40px; border-radius: 30px; font-weight: bold; border: none; cursor: pointer; }
    </style>
</head>
