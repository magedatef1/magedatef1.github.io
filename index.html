<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maged Atef</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        body { background-color: #121212; color: white; text-align: center; font-family: sans-serif; margin: 0; padding: 20px; }
        .container { max-width: 450px; margin: auto; display: flex; flex-direction: column; align-items: center; }

        /* توهج الإطار السماوي حول الصورة - ثابت في مكانه */
        @keyframes borderGlowFixed {
            0% { box-shadow: 0 0 5px rgba(0, 210, 255, 0.3); border-color: rgba(0, 210, 255, 0.5); }
            50% { box-shadow: 0 0 20px rgba(0, 210, 255, 0.8); border-color: rgba(0, 210, 255, 1); }
            100% { box-shadow: 0 0 5px rgba(0, 210, 255, 0.3); border-color: rgba(0, 210, 255, 0.5); }
        }

        .profile-img { 
            width: 115px; height: 115px; border-radius: 50%; 
            border: 3px solid #00d2ff; margin-bottom: 20px;
            display: block; object-fit: cover;
            animation: borderGlowFixed 3s ease-in-out infinite;
        }

        /* توهج الاسم الاحترافي - ثابت بدون حركة */
        @keyframes textGlowBlue {
            0% { text-shadow: 0 0 5px rgba(0, 210, 255, 0.3); }
            50% { text-shadow: 0 0 20px rgba(0, 210, 255, 1), 0 0 10px rgba(255, 255, 255, 0.5); }
            100% { text-shadow: 0 0 5px rgba(0, 210, 255, 0.3); }
        }

        .name-sparkle { 
            font-size: 34px; font-weight: bold; margin: 10px 0;
            color: #00d2ff; 
            animation: textGlowBlue 3s ease-in-out infinite;
            display: inline-block; /* لضمان الثبات */
        }

        /* توهج العبارة الذهبي - ثابت بدون حركة */
        @keyframes textGlowGold {
            0% { text-shadow: 0 0 5px rgba(255, 204, 0, 0.2); }
            50% { text-shadow: 0 0 15px rgba(255, 204, 0, 0.9), 0 0 8px rgba(255, 255, 255, 0.4); }
            100% { text-shadow: 0 0 5px rgba(255, 204, 0, 0.2); }
        }

        .desc-fixed { 
            font-size: 18px; font-weight: bold; margin-bottom: 30px; line-height: 1.6;
            color: #ffcc00; 
            animation: textGlowGold 3s ease-in-out infinite;
            display: block; /* لضمان الثبات */
            max-width: 90%;
        }

        /* تنسيق الروابط والأزرار */
        .links-container { width: 100%; display: flex; flex-direction: column; gap: 12px; }
        .link-btn { 
            color: white; text-decoration: none; padding: 15px 20px; border-radius: 12px; 
            font-weight: bold; display: flex; align-items: center; 
            justify-content: space-between; font-size: 17px;
        }
        .link-btn i { font-size: 2.2rem; order: 2; } 
        .link-btn span { flex-grow: 1; text-align: right; order: 1; } 

        .tiktok { background-color: #ff0050; }
        .facebook { background-color: #1877f2; }
        .instagram { background-color: #e1306c; }
        .snapchat { background-color: #fffc00 !important; color: black !important; }
        .snapchat i { color: black !important; }
        .whatsapp { background-color: #25d366; }
    </style>
</head>
<body>
    <div class="container">
        <img src="https://github.com/magedatef1.png" class="profile-img">
        
        <h2 class="name-sparkle">Maged Atef</h2>
        
        <div class="desc-fixed">
            أفعل كل شيء يسعدني.. لأنني أعيش حياتي مرة واحدة فقط! 🎈✨ <br>
            واصنع من كل لحظة قصة جميلة 
        </div>
        
        <div class="links-container">
            <a href="https://www.tiktok.com/@magedatef12" class="link-btn tiktok"><span>تيك توك | TikTok</span><i class="fab fa-tiktok"></i></a>
            <a href="https://www.facebook.com/share/1bE1EhMq4S/" class="link-btn facebook"><span>فيسبوك | Facebook</span><i class="fab fa-facebook-f"></i></a>
            <a href="https://www.instagram.com/magedatef13" class="link-btn instagram"><span>انستجرام | Instagram</span><i class="fab fa-instagram"></i></a>
            <a href="https://www.snapchat.com/add/magedatef11" class="link-btn snapchat"><span>سناب شات | Snapchat</span><i class="fab fa-snapchat-ghost"></i></a>
            <a href="https://wa.me/qr/2RJGQMHOFZ27O1" class="link-btn whatsapp"><span>واتساب | WhatsApp</span><i class="fab fa-whatsapp"></i></a>
        </div>
    </div>
</body>
</html>
