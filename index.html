        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            min-height: 100vh;
            background-image: url('background.jpg');
            background-color: #1a1a1a;
            background-size: cover;
            background-position: center;
            background-attachment: fixed; /* سر منع الاهتزاز */
            background-repeat: no-repeat;
            color: white;
            text-align: center;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-bottom: 50px;
        }
        
        .img-wrapper { 
            position: relative; 
            width: 180px; 
            height: 180px; 
            margin-top: 50px; /* دفع الصورة للأسفل قليلاً */
            margin-bottom: 20px; 
        }
        .profile-img { width: 170px; height: 170px; border-radius: 50%; border: 5px solid #00d2ff; }
        
        @keyframes rotate { 100% { transform: rotate(360deg); } }
        .img-wrapper::after { content: ''; position: absolute; top: -5px; left: -5px; width: 180px; height: 180px; border-radius: 50%; border: 5px solid transparent; border-top: 5px solid #00d2ff; border-bottom: 5px solid #00d2ff; animation: rotate 2s linear infinite; }
        
        @keyframes pulseText { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        .name-wrapper { display: flex; align-items: center; justify-content: center; gap: 10px; margin: 15px 0; animation: pulseText 3s infinite; }
        .name-text { font-size: 44px; font-weight: bold; color: #fff; margin: 0; }
        .verified-badge { color: #00d2ff; font-size: 34px; }
        .desc-fixed { font-size: 24px; font-weight: bold; color: #ffcc00; margin-bottom: 30px; animation: pulseText 3s infinite; padding: 0 20px; }

        .links-container { width: 90%; max-width: 500px; display: grid; gap: 20px; }
        .link-btn { 
            background: rgba(0,0,0,0.6); color: white; text-decoration: none; padding: 25px; 
            border-radius: 25px; font-size: 24px; font-weight: bold; border: 2px solid #00d2ff;
            display: flex; align-items: center; justify-content: center; gap: 20px;
            transition: 0.3s;
        }
        .link-btn:hover { background: rgba(0,210,255,0.2); }
        
        .share-btn { margin-top: 40px; background: #00d2ff; color: #000; padding: 20px 50px; border-radius: 30px; font-size: 24px; font-weight: bold; border: none; cursor: pointer; }
        .footer-text { margin-top: 40px; font-size: 14px; color: #fff; padding: 10px; }
