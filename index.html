
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maged Atef</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        
        body { 
            background-image: url('15098.jpg'); 
            background-size: cover; 
            background-position: center; 
            background-attachment: fixed; 
            color: white; 
            text-align: center; 
            font-family: sans-serif; 
            margin: 0; 
            padding: 20px; 
        }

        .container { max-width: 600px; margin: auto; display: flex; flex-direction: column; align-items: center; }

        @keyframes borderPulse {
            0%, 100% { border-color: rgba(0, 210, 255, 0.5); box-shadow: 0 0 15px rgba(0, 210, 255, 0.4); }
            50% { border-color: rgba(0, 210, 255, 1); box-shadow: 0 0 35px rgba(0, 210, 255, 0.8); }
        }
        .profile-img { 
            width: 110px; height: 110px; border-radius: 50%; border: 3px solid #00d2ff; 
            margin-bottom: 15px; animation: borderPulse 3s infinite;
        }

        .name-wrapper { display: flex; align-items: center; justify-content: center; gap: 10px; margin: 10px 0; }

        @keyframes intenseGlow {
            0%, 100% { text-shadow: 0 0 10px rgba(0, 210, 255, 0.6); color: #00d2ff; }
            50% { text-shadow: 0 0 30px rgba(0, 210, 255, 1), 0 0 45px rgba(255, 255, 255, 0.4); color: #ffffff; }
        }
        .name-sparkle { font-size: 34px; font-weight: bold; animation: intenseGlow 2.5s infinite; margin: 0; }
        .verified-badge { color: #1877f2; font-size: 26px; animation: intenseGlow 2.5s infinite; }

        @keyframes descGlow {
            0%, 100% { text-shadow: 0 0 10px rgba(255, 204, 0, 0.6); color: #ffcc00; }
            50% { text-shadow: 0 0 30px rgba(255, 204, 0, 1); color: #fffbe6; }
        }
        .desc-fixed { font-size: 19px; font-weight: bold; margin-bottom: 25px; animation: descGlow 3s infinite; line-height: 1.6; }

        @keyframes iconBounce {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }

        .links-container { 
            width: 100%; 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 12px; 
        }
