<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maged Atef</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        body { 
            background-image: url('https://i.imgur.com/8Qz5S8O.jpg'); 
            background-size: cover; background-position: center; 
            background-attachment: fixed; color: white; text-align: center; 
            font-family: sans-serif; margin: 0; padding: 20px; 
            min-height: 100vh; display: flex; align-items: center; justify-content: center;
        }
        .container { max-width: 600px; width: 100%; display: flex; flex-direction: column; align-items: center; }
        
        .profile-img { width: 170px; height: 170px; border-radius: 50%; border: 5px solid #00d2ff; margin-bottom: 20px; }
        
        /* حركة الاسم والوصف */
        @keyframes pulseText { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        .name-wrapper { display: flex; align-items: center; justify-content: center; gap: 10px; margin: 15px 0; animation: pulseText 3s infinite; }
        .name-text { font-size: 44px; font-weight: bold; color: #fff; margin: 0; }
        .verified-badge { color: #00d2ff; font-size: 34px; }
        .desc-fixed { font-size: 24px; font-weight: bold; color: #ffcc00; margin-bottom: 40px; animation: pulseText 3s infinite; }

        /* حركة الأزرار */
        @keyframes bounceIcon { 0%, 100% { transform: translateX(0); } 50% { transform: translateX(-10px); } }
        .links-container { width: 100%; display: grid; grid-template-columns: repeat(1, 1fr); gap: 20px; }
        .link-btn { 
            background: rgba(0,0,0,0.6); 
            color: white; text-decoration: none; padding: 30px; border-radius: 25px;
            font-size: 28px; font-weight: bold; border: 2px solid #00d2ff;
            display: flex; align-items: center; justify-content: center; gap: 25px;
            transition: 0.3s;
        }
        .link-btn i { font-size: 42px; animation: bounceIcon 2s infinite; } /* أيقونات كبيرة ومتحركة */
    </style>
</head>
<body>
    <div class="container">
        <img src="https://github.com/magedatef1.png" class="profile-img">
        <div class="name-wrapper">
            <h1 class="name-text">Maged Atef</h1>
            <i class="fas fa-check-circle verified-badge"></i>
        </div>
        <p class="desc-fixed">أفعل كل شيء يسعدني.. لأنني أعيش حياتي مرة واحدة فقط! 🎈✨</p>
        
        <div class="links-container">
            <a href="https://www.facebook.com/share/1bE1EhMq4S/" class="link-btn"><i class="fab fa-facebook" style="color:#1877f2"></i> Facebook</a>
            <a href="https://www.tiktok.com/@magedatef12" class="link-btn"><i class="fab fa-tiktok" style="color:#ff0050"></i> TikTok</a>
            <a href="https://www.instagram.com/magedatef13" class="link-btn"><i class="fab fa-instagram" style="color:#e1306c"></i> Instagram</a>
            <a href="https://t.me/MagedAtef1" class="link-btn"><i class="fab fa-telegram" style="color:#0088cc"></i> Telegram</a>
            <a href="https://vk.com/magedatef" class="link-btn"><i class="fab fa-vk" style="color:#4c75a3"></i> VK</a>
            <a href="https://ok.ru/profile/910150164494" class="link-btn"><i class="fab fa-odnoklassniki" style="color:#ed812b"></i> OK.ru</a>
        </div>
    </div>
</body>
</html>
