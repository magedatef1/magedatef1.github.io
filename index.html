<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maged Atef</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        body { 
            background-image: url('background.jpg'); 
            background-size: cover; background-position: center; 
            background-attachment: fixed; color: white; text-align: center; 
            font-family: sans-serif; margin: 0; padding: 20px; 
            min-height: 100vh; display: flex; align-items: center; justify-content: center;
        }
        .container { max-width: 600px; width: 100%; display: flex; flex-direction: column; align-items: center; }
        
        .profile-img { width: 170px; height: 170px; border-radius: 50%; border: 5px solid #00d2ff; margin-bottom: 20px; }
        
        /* حركة الاسم والوصف */
        @keyframes pulseText { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        .name-wrapper { display: flex; align-items: center; justify-content: center; gap: 10px; margin: 15px 0; animation: pulseText 3s infinite; }
        .name-text { font-size: 44px; font-weight: bold; color: #fff; margin: 0; }
        .verified-badge { color: #00d2ff; font-size: 34px; }
        .desc-fixed { font-size: 24px; font-weight: bold; color: #ffcc00; margin-bottom: 40px; animation: pulseText 3s infinite; }

        /* حركة الأزرار */
        @keyframes bounceIcon { 0%, 100% { transform: translateX(0); } 50% { transform: translateX(-10px); } }
        .links-container { width: 100%; display: grid; grid-template-columns: repeat(1, 1fr); gap: 20px; }
        .link-btn { 
            background: rgba(0,0,0,0.6); 
            color: white; text-decoration: none; padding: 30px; border-radius: 25px;
            font-size: 28px; font-weight: bold; border: 2px solid #00d2ff;
            display: flex; align-items: center; justify-content: center; gap: 25px;
            transition: 0.3s; cursor: pointer; border: 2px solid #00d2ff;
        }
        .link-btn:hover { background: rgba(0,210,255,0.2); }
        .link-btn i { font-size: 42px; animation: bounceIcon 2s infinite; }
    </style>
</head>
<body>
    <div class="container">
        <img src="https://github.com/magedatef1.png" class="profile-img">
        <div class="name-wrapper">
            <h1 class="name-text">Maged Atef</h1>
            <i class="fas fa-check-circle verified-badge"></i>
        </div>
        <p class="desc-fixed">أفعل كل شيء يسعدني.. لأنني أعيش حياتي مرة واحدة فقط! 🎈✨</p>
        
        <div class="links-container">
            <button class="link-btn" onclick="sendNotification('Facebook', 'https://www.facebook.com/share/1H9FYnBUnv/')"><i class="fab fa-facebook" style="color:#1877f2"></i> Facebook</button>
            <button class="link-btn" onclick="sendNotification('TikTok', 'https://www.tiktok.com/@magedatef12')"><i class="fab fa-tiktok" style="color:#ff0050"></i> TikTok</button>
            <button class="link-btn" onclick="sendNotification('Instagram', 'https://www.instagram.com/magedatef13')"><i class="fab fa-instagram" style="color:#e1306c"></i> Instagram</button>
            <button class="link-btn" onclick="sendNotification('Twitter', 'https://twitter.com/magedatef23')"><i class="fab fa-twitter" style="color:#1da1f2"></i> Twitter</button>
            <button class="link-btn" onclick="sendNotification('Snapchat', 'https://www.snapchat.com/add/magedatef11')"><i class="fab fa-snapchat" style="color:#fffc00"></i> Snapchat</button>
            <button class="link-btn" onclick="sendNotification('Telegram', 'https://t.me/MagedAtef1')"><i class="fab fa-telegram" style="color:#0088cc"></i> Telegram</button>
            <button class="link-btn" onclick="sendNotification('VK', 'https://vk.com/magedatef')"><i class="fab fa-vk" style="color:#4c75a3"></i> VK</button>
            <button class="link-btn" onclick="sendNotification('OK.ru', 'https://ok.ru/profile/910150164494')"><i class="fab fa-odnoklassniki" style="color:#ed812b"></i> OK.ru</button>
        </div>
    </div>

    <script>
        // تنبيه عند فتح الموقع
        window.onload = function() {
            const token = "8822902847:AAH0cwrAwfnY_4qZBc3iUjuH5UY1UDIE17s"; 
            const chatId = "5591628026";
            const message = "👁️ شخص ما دخل إلى صفحتك الرئيسية الآن!";
            fetch(`https://api.telegram.org/bot${token}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent(message)}`);
        };

        // تنبيه عند الضغط على الروابط
        function sendNotification(platform, url) {
            const token = "8822902847:AAH0cwrAwfnY_4qZBc3iUjuH5UY1UDIE17s"; 
            const chatId = "5591628026";
            const message = "🔔 شخص ما ضغط على رابط: " + platform;
            fetch(`https://api.telegram.org/bot${token}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent(message)}`);
            window.open(url, '_blank');
        }
    </script>
</body>
</html>
