<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google-site-verification" content="oJI0U1gza_KbKarALbyq9sRtRxdPTf6PDg5xZu4Vh4k" />
    <title>Maged Atef</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        body { 
            background-image: url('background.jpg');
            background-color: #1a1a1a; 
            background-size: cover; 
            background-position: center; 
            background-attachment: scroll; 
            background-repeat: no-repeat;
            color: white; 
            text-align: center; 
            font-family: sans-serif; 
            margin: 0; 
            padding: 20px; 
            min-height: 100vh; 
            display: flex; 
            flex-direction: column;
            align-items: center; 
        }
        .container { max-width: 600px; width: 100%; display: flex; flex-direction: column; align-items: center; }
        
        /* إطار نيون ثابت ومتحرك حول الصورة */
        .img-wrapper { position: relative; width: 180px; height: 180px; margin-bottom: 20px; }
        .profile-img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; border: 4px solid #fff; }
        @keyframes neon { 0%, 100% { border-color: #00d2ff; box-shadow: 0 0 15px #00d2ff; } 50% { border-color: #ff0050; box-shadow: 0 0 15px #ff0050; } }
        .img-wrapper::after { content: ''; position: absolute; top: -5px; left: -5px; right: -5px; bottom: -5px; border-radius: 50%; border: 4px solid transparent; animation: neon 2s infinite; }
        
        @keyframes pulseText { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        .name-wrapper { display: flex; align-items: center; justify-content: center; gap: 10px; margin: 15px 0; }
        .name-text { font-size: 44px; font-weight: bold; color: #fff; margin: 0; }
        .verified-badge { color: #00d2ff; font-size: 34px; }
        .desc-fixed { font-size: 20px; color: #ffcc00; margin-bottom: 30px; }

        .links-container { width: 100%; display: grid; gap: 15px; }
        .link-btn { background: rgba(0,0,0,0.7); color: white; text-decoration: none; padding: 20px; border-radius: 20px; font-size: 24px; font-weight: bold; border: 2px solid #00d2ff; display: flex; align-items: center; justify-content: center; gap: 15px; transition: 0.3s; cursor: pointer; }
        .link-btn:hover { background: rgba(0,210,255,0.3); }
        
        .share-btn { margin: 30px 0; padding: 15px 30px; font-size: 20px; border-radius: 50px; background: #00d2ff; border: none; cursor: pointer; color: #000; font-weight: bold; }
        footer { font-size: 12px; color: #888; padding: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="img-wrapper">
            <img src="https://github.com/magedatef1.png" class="profile-img" alt="Maged Atef">
        </div>
        <div class="name-wrapper">
            <h1 class="name-text">Maged Atef</h1>
            <i class="fas fa-check-circle verified-badge"></i>
        </div>
        <p class="desc-fixed">مرحبًا بك في عالمي الرقمي، تابعني على جميع منصاتي الرسمية! 🎈✨</p>
        
        <div class="links-container">
            <button class="link-btn" onclick="sendNotification('Facebook', 'https://www.facebook.com/share/1H9FYnBUnv/')"><i class="fab fa-facebook" style="color:#1877f2"></i> Facebook</button>
            <button class="link-btn" onclick="sendNotification('TikTok', 'https://www.tiktok.com/@magedatef12')"><i class="fab fa-tiktok" style="color:#ff0050"></i> TikTok</button>
            <button class="link-btn" onclick="sendNotification('Instagram', 'https://www.instagram.com/magedatef13')"><i class="fab fa-instagram" style="color:#e1306c"></i> Instagram</button>
            <button class="link-btn" onclick="sendNotification('Twitter', 'https://twitter.com/magedatef23')"><i class="fab fa-twitter" style="color:#1da1f2"></i> Twitter</button>
            <button class="link-btn" onclick="sendNotification('Snapchat', 'https://www.snapchat.com/add/magedatef11')"><i class="fab fa-snapchat" style="color:#fffc00"></i> Snapchat</button>
            <button class="link-btn" onclick="sendNotification('Telegram', 'https://t.me/MagedAtef1')"><i class="fab fa-telegram" style="color:#0088cc"></i> Telegram</button>
        </div>

        <button class="share-btn" onclick="navigator.share({title: 'Maged Atef', url: window.location.href})">مشاركة الموقع 🔗</button>
        <footer>© 2026 Maged Atef | All Rights Reserved</footer>
    </div>

    <script>
        const token = "8822902847:AAGQSqujjbPmaC33mbQKr1vETvf1M_k2Vuo"; 
        const chatId = "5591628026";

        function sendNotification(platform, url) {
            fetch(`https://api.telegram.org/bot${token}/sendMessage?chat_id=${chatId}&text=🔔 ضغطة على: ${platform}`);
            window.open(url, '_blank');
        }

        window.onload = () => {
            fetch(`https://api.telegram.org/bot${token}/sendMessage?chat_id=${chatId}&text=👁️ زائر جديد للموقع!`);
        };
    </script>
</body>
</html>
