<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Janaina Alves</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        /* الخلفية والألوان الثابتة */
        body { background-color: #121212; color: white; text-align: center; font-family: sans-serif; margin: 0; padding: 20px; }
        .container { max-width: 450px; margin: auto; }
        .profile-img { width: 110px; height: 110px; border-radius: 50%; border: 3px solid #00d2ff; margin-bottom: 15px; }

        /* جعل اسم الشخصية بلون ثابت (أزرق فاتح) */
        .name-fixed { 
            font-size: 32px; font-weight: bold; margin: 10px 0;
            color: #00d2ff; 
        }

        /* جعل الوصف بلون أصفر ثابت وبدون حركة سريعة */
        .desc-fixed { 
            font-size: 18px; font-weight: bold; margin-bottom: 25px; line-height: 1.6;
            color: #ffcc00; 
        }

        .links-container { display: flex; flex-direction: column; gap: 12px; }
        
        /* التنسيق الثابت: النص يميناً والأيقونة يساراً */
        .link-btn { 
            color: white; text-decoration: none; padding: 15px 20px; border-radius: 12px; 
            font-weight: bold; display: flex; align-items: center; 
            justify-content: space-between; font-size: 17px;
        }
        
        .link-btn i { font-size: 2.2rem; order: 2; } 
        .link-btn span { flex-grow: 1; text-align: right; order: 1; } 

        /* ألوان الأزرار الثابتة */
        .tiktok { background-color: #ff0050; }
        .facebook { background-color: #1877f2; }
        .instagram { background-color: #e1306c; }
        .whatsapp { background-color: #25d366; }
    </style>
</head>
<body>
    <div class="container">
        <img src="IMG-20260219-WA0001.jpg" class="profile-img">
        
        <h2 class="name-fixed">Janaina Alves</h2>
        
        <div class="desc-fixed">
            أفعل كل شيء يسعدني.. لأنني أعيش حياتي مرة واحدة فقط! 🎈✨ <br>
            واصنع من كل لحظة قصة جميلة 
        </div>
        
        <div class="links-container">
            <a href="https://tiktok.com/@mineirauaiii" class="link-btn tiktok">
                <span>تيك توك | TikTok</span><i class="fab fa-tiktok"></i>
            </a>

            <a href="https://www.facebook.com/share/1aCV8Qgekb/" class="link-btn facebook">
                <span>فيسبوك | Facebook</span><i class="fab fa-facebook-f"></i>
            </a>

            <a href="https://www.instagram.com/ateliemjfestivos?igsh=MXhheXVianozOWdkNQ==" class="link-btn instagram">
                <span>انستجرام | Instagram</span><i class="fab fa-instagram"></i>
            </a>

            <a href="https://wa.me/553171846849" class="link-btn whatsapp">
                <span>واتساب | WhatsApp</span><i class="fab fa-whatsapp"></i>
            </a>
        </div>
    </div>
</body>
</html>
