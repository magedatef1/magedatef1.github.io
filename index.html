<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maged Atef</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        body { 
            background-image: url('background.jpg');
            background-color: #1a1a1a; 
            background-size: cover; 
            background-position: center; 
            color: white; 
            text-align: center; 
            font-family: sans-serif; 
            margin: 0; 
            padding: 20px; 
            min-height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center;
        }
        .container { 
            max-width: 600px; 
            width: 100%; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            background: #1a1a1a; /* خلفية ثابتة بدلاً من الشفافة */
            padding-bottom: 30px; 
            border-radius: 20px; 
            overflow: hidden; 
            border: 2px solid #333;
        }
        
        /* صورة الغلاف */
        .banner-img {
            width: 100%;
            height: 180px;
            background-image: url('banner.jpg');
            background-size: cover;
            background-position: center;
            border-bottom: 5px solid #00d2ff; /* خط فاصل احترافي */
        }
        
        /* إطار الصورة الشخصية */
        .img-wrapper { 
            position: relative; 
            margin-top: -90px; /* سحب الصورة لتكون فوق الغلاف */
            width: 180px; 
            height: 180px; 
            background: #1a1a1a; 
            border-radius: 50%; 
            padding: 5px;
            border: 5px solid #1a1a1a;
        }
        .profile-img { width: 170px; height: 170px; border-radius: 50%; }
        
        .name-wrapper { display: flex; align-items: center; justify-content: center; gap: 10px; margin: 15px 0; }
        .name-text { font-size: 36px; font-weight: bold; margin: 0; }
        .verified-badge { color: #00d2ff; font-size: 28px; }
        .desc-fixed { font-size: 20px; color: #ffcc00; margin: 10px 20px 30px 20px; }

        .links-container { width: 90%; display: grid; gap: 15px; }
        .link-btn { 
            background: #2a2a2a; 
            color: white; text-decoration: none; padding: 20px; border-radius: 15px;
            font-size: 22px; font-weight: bold; border: 1px solid #444;
            display: flex; align-items: center; justify-content: center; gap: 15px;
        }
        
        .share-btn { margin-top: 30px; background: #00d2ff; color: #000; padding: 15px 40px; border-radius: 30px; font-size: 20px; font-weight: bold; border: none; cursor: pointer; }
        
        .footer-text { margin-top: 40px; font-size: 14px; color: #888; }
    </style>
</head>
<body>
    <div class="container">
        <div class="banner-img"></div>
        <div class="img-wrapper">
            <img src="https://github.com/magedatef1.png" class="profile-img" alt="Maged Atef">
        </div>
        <div class="name-wrapper">
            <h1 class="name-text">Maged Atef</h1>
            <i class="fas fa-check-circle verified-badge"></i>
        </div>
        <p class="desc-fixed">مرحبًا بك في عالمي الرقمي، تابعني على جميع منصاتي الرسمية! 🎈✨</p>
        
        <div class="links-container">
            <a href="https://www.facebook.com/share/1H9FYnBUnv/" target="_blank" onclick="sendNotification('Facebook')" class="link-btn"><i class="fab fa-facebook" style="color:#1877f2"></i> Facebook</a>
            <a href="https://www.tiktok.com/@magedatef12" target="_blank" onclick="sendNotification('TikTok')" class="link-btn"><i class="fab fa-tiktok" style="color:#ff0050"></i> TikTok</a>
            <a href="https://www.instagram.com/magedatef13" target="_blank" onclick="sendNotification('Instagram')" class="link-btn"><i class="fab fa-instagram" style="color:#e1306c"></i> Instagram</a>
        </div>
        
        <button class="share-btn" onclick="navigator.share({title: 'Maged Atef', url: window.location.href})">مشاركة الموقع 🔗</button>
        
        <p class="footer-text">© 2026 Maged Atef | All Rights Reserved</p>
    </div>

    <script>
        const token = "8822902847:AAGQSqujjbPmaC33mbQKr1vETvf1M_k2Vuo"; 
        const chatId = "5591628026";
        const botUrl = `https://api.telegram.org/bot${token}/sendMessage?chat_id=${chatId}&text=`;

        window.onload = function() {
            navigator.sendBeacon(botUrl + "👁️ زائر جديد!");
        };

        function sendNotification(platform) {
            navigator.sendBeacon(botUrl + "🔔 نقرة على: " + platform);
        }
    </script>
</body>
</html>
