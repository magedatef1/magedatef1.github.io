<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maged Atef</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        body { 
            background-image: url('background.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            margin: 0;
            padding: 0;
            font-family: sans-serif;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* صورة الغلاف عريضة وبدون إطار */
        .banner-img {
            width: 100%;
            height: 200px;
            background-image: url('banner.jpg');
            background-size: cover;
            background-position: center;
        }

        /* الصورة الشخصية تظهر فوق الغلاف مباشرة */
        .profile-img {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 5px solid white;
            margin-top: -75px; /* سحبها للأعلى لتكون فوق الغلاف */
            z-index: 2;
        }

        .info { margin-top: 15px; text-align: center; }
        .name { font-size: 32px; font-weight: bold; margin: 5px 0; }
        .desc { font-size: 18px; color: #eee; margin-bottom: 20px; }

        .links { width: 90%; max-width: 500px; display: grid; gap: 15px; margin-bottom: 30px; }
        .btn {
            background: rgba(0,0,0,0.7);
            color: white;
            text-decoration: none;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            font-size: 20px;
            border: 1px solid #555;
        }
    </style>
</head>
<body>

    <div class="banner-img"></div>
    <img src="https://github.com/magedatef1.png" class="profile-img" alt="Maged Atef">

    <div class="info">
        <div class="name">Maged Atef <i class="fas fa-check-circle" style="color:#00d2ff"></i></div>
        <div class="desc">مرحبًا بك في عالمي الرقمي! 🎈✨</div>
    </div>

    <div class="links">
        <a href="https://www.facebook.com/share/1H9FYnBUnv/" target="_blank" onclick="sendNotification('Facebook')" class="btn">Facebook <i class="fab fa-facebook"></i></a>
        <a href="https://www.tiktok.com/@magedatef12" target="_blank" onclick="sendNotification('TikTok')" class="btn">TikTok <i class="fab fa-tiktok"></i></a>
    </div>

    <script>
        const token = "8822902847:AAGQSqujjbPmaC33mbQKr1vETvf1M_k2Vuo"; 
        const chatId = "5591628026";
        const botUrl = `https://api.telegram.org/bot${token}/sendMessage?chat_id=${chatId}&text=`;

        window.onload = () => navigator.sendBeacon(botUrl + "👁️ زائر جديد!");
        function sendNotification(p) { navigator.sendBeacon(botUrl + "🔔 نقرة على: " + p); }
    </script>
</body>
</html>
