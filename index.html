<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maged Atef</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        body { 
            background-image: url('https://i.imgur.com/8Qz5S8O.jpg'); 
            background-size: cover; background-position: center; 
            background-attachment: fixed; color: white; text-align: center; 
            font-family: sans-serif; margin: 0; padding: 20px; 
            min-height: 100vh; display: flex; align-items: center; justify-content: center;
        }
        .container { max-width: 600px; width: 100%; display: flex; flex-direction: column; align-items: center; }
        @keyframes borderPulse {
            0%, 100% { border-color: rgba(0, 210, 255, 0.5); box-shadow: 0 0 15px rgba(0, 210, 255, 0.4); }
            50% { border-color: rgba(0, 210, 255, 1); box-shadow: 0 0 35px rgba(0, 210, 255, 0.8); }
        }
        .profile-img { width: 140px; height: 140px; border-radius: 50%; border: 4px solid #00d2ff; margin-bottom: 20px; animation: borderPulse 3s infinite; }
        .name-wrapper { display: flex; align-items: center; justify-content: center; gap: 10px; margin: 15px 0; }
        @keyframes intenseGlow {
            0%, 100% { text-shadow: 0 0 10px rgba(0, 210, 255, 0.6); color: #00d2ff; }
            50% { text-shadow: 0 0 30px rgba(0, 210, 255, 1); color: #ffffff; }
        }
        .name-sparkle { font-size: 38px; font-weight: bold; animation: intenseGlow 2.5s infinite; margin: 0; }
        .verified-badge { color: #1877f2; font-size: 30px; animation: intenseGlow 2.5s infinite; }
        @keyframes descGlow {
            0%, 100% { text-shadow: 0 0 10px rgba(255, 204, 0, 0.6); color: #ffcc00; }
            50% { text-shadow: 0 0 30px rgba(255, 204, 0, 1); color: #fffbe6; }
        }
        .desc-fixed { font-size: 22px; font-weight: bold; margin-bottom: 35px; animation: descGlow 3s infinite; line-height: 1.6; }
        .links-container { width: 100%; display: grid; grid-template-columns: repeat(1, 1fr); gap: 15px; }
        .link-btn { 
            background: rgba(0,0,0,0.5); backdrop-filter: blur(10px);
            color: white; text-decoration: none; padding: 25px; border-radius: 25px;
            font-size: 24px; font-weight: bold; border: 2px solid rgba(0,210,255,0.3);
            display: flex; align-items: center; justify-content: center; gap: 15px;
            transition: 0.3s;
        }
        .link-btn:hover { background: rgba(0,210,255,0.2); transform: scale(1.02); }
        .link-btn i { font-size: 30px; }
    </style>
</head>
<body>
    <div class="container">
        <img src="https://github.com/magedatef1.png" class="profile-img">
        <div class="name-wrapper">
            <h1 class="name-sparkle">Maged Atef</h1>
            <i class="fas fa-check-circle verified-badge"></i>
        </div>
        <p class="desc-fixed">أفعل كل شيء يسعدني.. لأنني أعيش حياتي مرة واحدة فقط! 🎈✨</p>
        <div class="links-container">
            <a href="https://www.facebook.com/share/1bE1EhMq4S/" class="link-btn"><i class="fab fa-facebook" style="color:#1877f2"></i> Facebook</a>
            <a href="https://www.tiktok.com/@magedatef12" class="link-btn"><i class="fab fa-tiktok" style="color:#ff0050"></i> TikTok</a>
            <a href="https://www.instagram.com/magedatef13" class="link-btn"><i class="fab fa-instagram" style="color:#e1306c"></i> Instagram</a>
            <a href="https://t.me/MagedAtef1" class="link-btn"><i class="fab fa-telegram" style="color:#0088cc"></i> Telegram</a>
        </div>
    </div>
</body>
</html>
