<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maged Atef</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        /* الأساسيات */
        body { 
            background-image: url('background.jpg'); 
            background-size: cover; background-position: center; 
            background-attachment: fixed; color: white; text-align: center; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; padding: 20px; min-height: 100vh; 
            display: flex; align-items: center; justify-content: center;
        }
        .container { max-width: 600px; width: 100%; }

        /* الصورة الشخصية */
        .profile-img { 
            width: 160px; height: 160px; border-radius: 50%; 
            border: 4px solid #fff; margin-bottom: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        /* --- الحركات (Animations) --- */
        
        /* 1. حركة الاسم: اهتزاز خفيف (Jiggle) */
        @keyframes jiggle {
            0% { transform: translate(1px, 1px); }
            50% { transform: translate(-1px, -1px); }
            100% { transform: translate(1px, 1px); }
        }
        .name-wrapper { 
            display: flex; align-items: center; justify-content: center; 
            gap: 10px; margin: 10px 0; 
        }
        .name-text { 
            font-size: 40px; font-weight: bold; color: #fff; margin: 0;
            animation: jiggle 0.5s infinite;
            animation-delay: 2s;
        }
        .verified-badge { color: #00d2ff; font-size: 28px; }

        /* 2. الوصف */
        .desc-fixed { 
            font-size: 18px; font-weight: 600; color: #ffcc00; 
            margin-bottom: 35px; text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }

        /* 3. حركة الأيقونات: نبض (Pulse) */
        @keyframes pulseIcon {
            0% { transform: scale(1); }
            50% { transform: scale(1.15); }
            100% { transform: scale(1); }
        }

        /* الأزرار (شكل صلب واحترافي) */
        .links-container { width: 100%; display: grid; gap: 18px; }
        .link-btn { 
            background: rgba(0, 0, 0, 0.7); /* لون خلفية صلب */
            color: white; text-decoration: none; padding: 22px 30px; 
            border-radius: 50px; 
            font-size: 24px; font-weight: bold; 
            border: 2px solid #00d2ff; 
            display: flex; align-items: center; justify-content: center; 
            gap: 20px; transition: all 0.3s ease; cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        
        .link-btn:hover { 
            background: #00d2ff; color: #000;
            transform: translateY(-3px);
            box-shadow: 0 6px 12px rgba(0,210,255,0.3);
        }
        .link-btn:hover i { color: #000 !important; }

        .link-btn i { 
            font-size: 32px; 
            animation: pulseIcon 2s infinite;
        }

        @media (max-width: 480px) {
            .profile-img { width: 130px; height: 130px; }
            .name-text { font-size: 32px; }
            .link-btn { font-size: 20px; padding: 18px; }
            .link-btn i { font-size: 28px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="https://github.com/magedatef1.png" class="profile-img" alt="Maged Atef">
        <div class="name-wrapper">
            <h1 class="name-text">Maged Atef</h1>
            <i class="fas fa-check-circle verified-badge"></i>
        </div>
        <p class="desc-fixed">أفعل كل شيء يسعدني.. لأنني أعيش حياتي مرة واحدة فقط! 🎈✨</p>
        
        <div class="links-container">
            <button class="link-btn" onclick="sendNotification('Facebook', 'https://www.facebook.com/share/1H9FYnBUnv/')"><i class="fab fa-facebook" style="color:#1877f2"></i> Facebook</button>
            <button class="link-btn" onclick="sendNotification('TikTok', 'https://www.tiktok.com/@magedatef12')"><i class="fab fa-tiktok" style="color:#ff0050"></i> TikTok</button>
            <button class="link-btn" onclick="sendNotification('Instagram', 'https://www.instagram.com/magedatef13')"><i class="fab fa-instagram" style="color:#e1306c"></i> Instagram</button>
            <button class="link-btn" onclick="sendNotification('Twitter', 'https://twitter.com/magedatef23')"><i class="fab fa-twitter" style="color:#1da1f2"></i> Twitter</button>
            <button class="link-btn" onclick="sendNotification('Snapchat', 'https://www.snapchat.com/add/magedatef11')"><i class="fab fa-snapchat" style="color:#fffc00"></i> Snapchat</button>
            <button class="link-btn" onclick="sendNotification('Telegram', 'https://t.me/MagedAtef1')"><i class="fab fa-telegram" style="color:#0088cc"></i> Telegram</button>
        </div>
    </div>

    <script>
        function sendNotification(platform, url) {
            const token = "8822902847:AAH0cwrAwfnY_4qZBc3iUjuH5UY1UDIE17s"; 
            const chatId = "5591628026";
            const message = "🔔 شخص ما ضغط على رابط: " + platform;

            fetch(`https://api.telegram.org/bot${token}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent(message)}`);
            window.open(url, '_blank');
        }
    </script>
</body>
</html>
