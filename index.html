<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maged Atef</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <style>
        /* إخفاء تام لأدوات جوجل */
        .goog-te-banner-frame, .goog-te-menu-frame, #goog-gt-tt, .skiptranslate { display: none !important; }
        body { top: 0px !important; position: static !important; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        body { background-image: url('background.jpg'); background-color: #1a1a1a; background-size: cover; color: white; text-align: center; font-family: sans-serif; margin: 0; padding: 20px; min-height: 100vh; display: flex; align-items: center; justify-content: center; animation: fadeIn 0.8s ease-in; }
        .container { max-width: 600px; width: 100%; display: flex; flex-direction: column; align-items: center; }
        
        .img-wrapper { position: relative; width: 180px; height: 180px; margin-bottom: 20px; }
        .profile-img { width: 170px; height: 170px; border-radius: 50%; border: 5px solid #00d2ff; object-fit: cover; }
        @keyframes rotate { 100% { transform: rotate(360deg); } }
        .img-wrapper::after { content: ''; position: absolute; top: -5px; left: -5px; width: 180px; height: 180px; border-radius: 50%; border: 5px solid transparent; border-top: 5px solid #00d2ff; border-bottom: 5px solid #00d2ff; animation: rotate 2s linear infinite; }
        
        @keyframes pulseText { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        .name-wrapper { display: flex; align-items: center; justify-content: center; gap: 10px; margin: 15px 0; animation: pulseText 3s infinite; }
        .name-text { font-size: 44px; font-weight: bold; color: #fff; margin: 0; }
        .verified-badge { color: #00d2ff; font-size: 34px; }
        .desc-fixed { font-size: 24px; font-weight: bold; color: #ffcc00; margin-bottom: 40px; animation: pulseText 3s infinite; }

        @keyframes bounceIcon { 0%, 100% { transform: translateX(0); } 50% { transform: translateX(-10px); } }
        .links-container { width: 100%; display: grid; gap: 20px; }
        .link-btn { background: rgba(0,0,0,0.6); color: white; text-decoration: none; padding: 30px; border-radius: 25px; font-size: 28px; font-weight: bold; border: 2px solid #00d2ff; display: flex; align-items: center; justify-content: center; gap: 25px; transition: 0.3s; }
        .link-btn i { font-size: 42px; animation: bounceIcon 2s infinite; }
        
        @keyframes pulseBtn { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        .share-btn { margin-top: 40px; background: #00d2ff; color: #000; padding: 20px 50px; border-radius: 30px; font-size: 24px; font-weight: bold; border: none; animation: pulseBtn 1.5s infinite; }
        .footer-text { margin-top: 50px; font-size: 16px; color: #fff; line-height: 1.6; }
    </style>
</head>
<body>
    <div id="google_translate_element" style="display:none;"></div>

    <div class="container">
        <div class="img-wrapper">
            <img src="https://github.com/magedatef1.png" class="profile-img" alt="Maged Atef">
        </div>
        <div class="name-wrapper">
            <h1 class="name-text">Maged Atef</h1>
            <i class="fas fa-check-circle verified-badge"></i>
        </div>
        <p class="desc-fixed">"مرحبًا بك في عالمي الرقمي، أنا Maged Atef. تابعني على جميع منصاتي الرسمية، وابقَ على اطلاع بكل جديد.! 🎈✨</p>
        
        <div class="links-container">
            <a href="https://www.facebook.com/share/1H9FYnBUnv/" class="link-btn"><i class="fab fa-facebook" style="color:#1877f2"></i> Facebook</a>
            <a href="https://www.tiktok.com/@magedatef12" class="link-btn"><i class="fab fa-tiktok" style="color:#ff0050"></i> TikTok</a>
            <a href="https://www.instagram.com/magedatef13" class="link-btn"><i class="fab fa-instagram" style="color:#e1306c"></i> Instagram</a>
            <a href="https://twitter.com/magedatef23" class="link-btn"><i class="fab fa-twitter" style="color:#1da1f2"></i> Twitter</a>
            <a href="https://www.snapchat.com/add/magedatef11" class="link-btn"><i class="fab fa-snapchat" style="color:#fffc00"></i> Snapchat</a>
            <a href="https://t.me/MagedAtef1" class="link-btn"><i class="fab fa-telegram" style="color:#0088cc"></i> Telegram</a>
            <a href="https://vk.com/magedatef" class="link-btn"><i class="fab fa-vk" style="color:#4c75a3"></i> VK</a>
            <a href="https://ok.ru/profile/910150164494" class="link-btn"><i class="fab fa-odnoklassniki" style="color:#ed812b"></i> OK.ru</a>
        </div>
        
        <button class="share-btn" onclick="navigator.share({title: 'Maged Atef', url: window.location.href})">مشاركة الموقع 🔗</button>
        <p class="footer-text">© 2026 Maged Atef</p>
    </div>

    <!-- كود الترجمة (تحميل بعد 3 ثوانٍ لمنع التشويش) -->
    <script type="text/javascript">
        setTimeout(function(){
            var script = document.createElement('script');
            script.src = "//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit";
            document.body.appendChild(script);
        }, 3000);
        function googleTranslateElementInit() {
            new google.translate.TranslateElement({pageLanguage: 'ar', autoDisplay: false}, 'google_translate_element');
            // تفعيل الترجمة التلقائية
            setTimeout(function(){
                var select = document.querySelector('select.goog-te-combo');
                var userLang = navigator.language.split('-')[0];
                if (select && userLang !== 'ar') {
                    select.value = userLang;
                    select.dispatchEvent(new Event('change'));
                }
            }, 1000);
        }
    </script>
</body>
</html>
